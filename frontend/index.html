<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milo Radio App</title>

    <!-- ============================================================
         1. PWA META TAGS (Wichtig für die Installation auf dem Handy)
         ============================================================ -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-title" content="Milo Radio" />

    <!-- iOS Icons für den Home-Bildschirm -->
    <link rel="apple-touch-icon" href="./images/android.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./images/android.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/android.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./images/android.png" />

    <!-- Bootstrap CSS (Styling-Bibliothek) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- PWA MANIFEST (Steuert, wie die App installiert aussieht) -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Eigene Styles (Design-Anpassungen) -->
    <link rel="stylesheet" href="./css/style.css" />

    <!-- Lesezeichen-Icons (Favicon) -->
    <link rel="icon" href="./images/android.png" type="image/png" />
  </head>
  <body>
    <!-- 
      NAVBAR: Die Navigationsleiste (wird per JavaScript befüllt) 
    -->
    <nav id="app-nav" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center fw-bold" href="#" onclick="event.preventDefault(); window.location.hash='radio'" style="white-space: nowrap;">
          <img src="./images/android.png" alt="Logo" width="55" height="55" class="d-inline-block align-text-top me-2 rounded-circle border border-secondary p-1">
          <span class="text-white">Milo <span class="text-primary">Radio</span></span>
        </a>
        <div class="d-flex align-items-center">
          <a href="#settings" class="nav-link d-lg-none me-2 p-2" title="Menü / Einstellungen">
            <i class="bi bi-gear-fill fs-4 text-white-50"></i>
          </a>
          <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto" id="nav-list">
            <!-- Wird dynamisch befüllt -->
          </ul>
        </div>
      </div>
    </nav>

    <!-- 
      CONTENT: Der Hauptbereich der App (hier werden die Seiten geladen) 
    -->
    <main id="app-content" class="container py-4 mb-5"></main>

    <!-- 
      BOTTOM BAR: Fußzeile der App 
    -->
    <footer id="app-footer" class="fixed-bottom bg-dark text-white-50 py-2 border-top border-secondary">
      <div class="container text-center small">
        © 2026 Milo Radio • <span class="text-info">Premium Edition</span>
      </div>
    </footer>

    <!-- Bootstrap JS (Für Modals und UI-Elemente) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Chart.js für die Statistiken -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PWA SERVICE WORKER -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js?v=7")
            .then((reg) => console.log("SW v7 aktiv (Restructured Assets)"))
            .catch((err) => console.log("SW Fehler:", err));
        });
      }
    </script>

    <!-- Main JS entry point -->
    <script type="module" src="./js/main.js?v=6"></script>

    <!-- QR Code Modal -->
    <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary shadow-lg" style="border-radius: 20px;">
          <div class="modal-header border-secondary">
            <h5 class="modal-title fw-bold">Milo Radio teilen</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body d-flex flex-column align-items-center text-center p-4">
            <img src="./images/qr-code.png" alt="QR Code" class="img-fluid rounded shadow-lg mb-3 mx-auto" style="max-width: 250px;">
            <p class="mb-0 text-white-50">Scanne diesen Code, um Milo Radio auf deinem Smartphone zu öffnen.</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
