<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milo Radio App</title>

    <!-- ============================================================
         1. PWA META TAGS (Wichtig für die Installation auf dem Handy)
         ============================================================ -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="apple-mobile-web-app-title" content="Milo Radio" />

    <!-- iOS Icons für den Home-Bildschirm -->
    <link rel="apple-touch-icon" href="./images/android.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./images/android.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./images/android.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="./images/android.png" />

    <!-- Bootstrap CSS (Styling-Bibliothek) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- PWA MANIFEST (Steuert, wie die App installiert aussieht) -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Eigene Styles (Design-Anpassungen) -->
    <link rel="stylesheet" href="./css/style.css" />

    <!-- Lesezeichen-Icons (Favicon) -->
    <link rel="icon" href="./images/android.png" type="image/png" />
  </head>
  <body>
    <!-- 
      NAVBAR: Die Navigationsleiste (wird per JavaScript befüllt) 
    -->
    <nav id="navbar"></nav>

    <!-- 
      CONTENT: Der Hauptbereich der App (hier werden die Seiten geladen) 
    -->
    <div id="content" class="container mt-3"></div>

    <!-- ============================================================
         2. MODALS (Popups für QR-Code und Admin-Login)
         ============================================================ -->

    <!-- QR CODE MODAL: Zeigt den App-Link als QR-Code an -->
    <div class="modal fade" id="qrModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-center p-3">
          <div class="modal-header border-0">
            <h5 class="modal-title">QR-Code anschauen</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <img
              src="./images/qr-code.png"
              alt="QR-Code"
              style="max-width: 200px; width: 100%"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- ADMIN LOGIN MODAL: PIN-Eingabe für Admin-Funktionen -->
    <div class="modal fade" id="adminModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Admin Login</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="password"
              id="adminPinInput"
              class="form-control"
              placeholder="Admin PIN eingeben"
            />
            <div id="adminError" class="text-danger small mt-2 d-none">
              Falscher PIN
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Abbrechen
            </button>
            <button type="button" class="btn btn-primary" id="adminLoginBtn">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 
      BOTTOM BAR: Fußzeile der App 
    -->
    <div id="bottomBar" class="navbar-style">
      <span class="text-white">© 2026 Milo Radio</span>
    </div>

    <!-- ============================================================
         3. SKRIPTE (Logik der App)
         ============================================================ -->

    <!-- Bootstrap JS (Für Modals und UI-Elemente) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- PWA SERVICE WORKER: Macht die App offline-fähig -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("SW registriert!"))
            .catch((err) => console.log("SW Fehler:", err));
        });
      }
    </script>

    <!-- Main JS: Der Einstiegspunkt für die gesamte App-Logik (als Modul) -->
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
